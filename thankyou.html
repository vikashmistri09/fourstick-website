<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | FOURSTICK</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#6366f1',
                            accent: '#a855f7',
                            card: '#0f0f14',
                            bg: '#050507'
                        }
                    },
                    keyframes: {
                        float1: {
                            '0%, 100%': { transform: 'translate(0px, 0px) scale(1)' },
                            '50%': { transform: 'translate(60px, -50px) scale(1.2)' }
                        },
                        float2: {
                            '0%, 100%': { transform: 'translate(0px, 0px) scale(1)' },
                            '50%': { transform: 'translate(-50px, 60px) scale(1.1)' }
                        },
                        float3: {
                            '0%, 100%': { transform: 'translate(0px, 0px) scale(1)' },
                            '50%': { transform: 'translate(40px, 40px) scale(1.15)' }
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(25px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    },
                    animation: {
                        'float-1': 'float1 12s ease-in-out infinite',
                        'float-2': 'float2 16s ease-in-out infinite',
                        'float-3': 'float3 10s ease-in-out infinite',
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden;
        }
    </style>
</head>
<body class="bg-brand-bg text-slate-100 antialiased min-h-screen flex flex-col justify-between relative selection:bg-brand-primary selection:text-white">

    <!-- MOVING BACKGROUND ANIMATED ORBS (Kahin bhi blank nahi rahega) -->
    <div class="absolute top-10 left-10 w-72 h-72 bg-indigo-600/20 rounded-full blur-[100px] pointer-events-none animate-float-1"></div>
    <div class="absolute bottom-10 right-10 w-80 h-80 bg-purple-600/20 rounded-full blur-[120px] pointer-events-none animate-float-2"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-brand-primary/10 rounded-full blur-[150px] pointer-events-none animate-float-3"></div>
    
    <!-- SUBTLE GRID PATTERN -->
    <div class="absolute inset-0 bg-[linear-gradient(to_right,#1f1f2e12_1px,transparent_1px),linear-gradient(to_bottom,#1f1f2e12_1px,transparent_1px)] bg-[size:3.5rem_3.5rem] pointer-events-none"></div>

    <!-- HEADER / BRANDING -->
    <header class="w-full py-6 px-6 sm:px-12 flex justify-center items-center z-10 border-b border-slate-800/80 bg-brand-bg/80 backdrop-blur-xl">
        <a href="index.html" class="text-2xl font-extrabold tracking-tighter text-white flex items-center gap-2 hover:opacity-90 transition">
            FOUR<span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-primary to-brand-accent">STICK</span>
        </a>
    </header>

    <!-- MAIN THANK YOU CONTENT -->
    <main class="flex-grow flex items-center justify-center px-4 py-12 z-10">
        <div class="max-w-md w-full bg-brand-card/95 border border-slate-800 rounded-3xl p-8 sm:p-10 text-center shadow-[0_0_50px_rgba(0,0,0,0.9)] relative overflow-hidden animate-fade-in-up backdrop-blur-2xl">
            
            <!-- Card Ambient Glow -->
            <div class="absolute -top-24 left-1/2 -translate-x-1/2 w-48 h-48 bg-gradient-to-r from-brand-primary/25 to-brand-accent/25 rounded-full blur-2xl pointer-events-none"></div>

            <!-- FIXED & VISIBLE TICK MARK (Using Clean SVG) -->
            <div class="relative w-20 h-20 mx-auto mb-6 flex items-center justify-center">
                <div class="absolute inset-0 rounded-2xl bg-gradient-to-tr from-brand-primary to-brand-accent opacity-25 blur-md animate-pulse"></div>
                <div class="relative w-full h-full bg-slate-900 border border-slate-700/80 rounded-2xl flex items-center justify-center shadow-xl">
                    <svg class="w-10 h-10 text-brand-accent" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>

            <!-- Status Badge -->
            <div class="inline-flex items-center gap-2 px-3.5 py-1.5 rounded-full bg-slate-800/80 border border-slate-700 text-brand-accent text-xs font-semibold mb-4 shadow-inner">
                <span class="w-2 h-2 rounded-full bg-brand-accent animate-ping"></span> 
                <span>Successfully Submitted</span>
            </div>

            <h1 class="text-3xl font-extrabold text-white mb-3 tracking-tight">Thank You!</h1>
            <p class="text-slate-400 text-sm mb-8 leading-relaxed">
                Aapka message humein successfully mil gaya hai. Hamari performance marketing team jald hi aapse contact karegi.
            </p>

            <div>
                <a href="index.html" class="inline-flex items-center justify-center gap-2 w-full bg-gradient-to-r from-brand-primary to-brand-accent text-white font-bold py-4 rounded-xl hover:opacity-95 hover:scale-[1.02] transition-all duration-200 shadow-xl shadow-brand-primary/25 text-sm cursor-pointer group">
                    <i data-lucide="arrow-left" class="w-4 h-4 transition-transform group-hover:-translate-x-1"></i> Back to Homepage
                </a>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="py-6 text-center text-xs text-slate-500 z-10 border-t border-slate-800/80 bg-brand-bg/80">
        © 2026 FOURSTICK. All rights reserved.
    </footer>

    <!-- Initialize Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
